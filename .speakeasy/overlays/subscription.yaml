overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Subscription Terraform overlay
  version: 0.0.1
actions:

  # Entity management
  - target: $.paths["/organizations/{orgId}/environments/{envId}/apis/{apiHrid}/subscriptions"].put
    update:
      x-speakeasy-entity-operation: Subscription#create,update
  - target: $.paths["/organizations/{orgId}/environments/{envId}/apis/{apiHrid}/subscriptions/{hrid}"].get
    update:
      x-speakeasy-entity-operation: Subscription#read
  - target: $.paths["/organizations/{orgId}/environments/{envId}/apis/{apiHrid}/subscriptions/{hrid}"].delete
    update:
      x-speakeasy-entity-operation: Subscription#delete
  - target: $.components.schemas.SubscriptionSpec
    update:
      x-speakeasy-entity: Subscription

  # Subscription-specific status fields
  - target: $.components.schemas.SubscriptionStatus.allOf[?@.properties.startingAt].properties.startingAt
    description: Computed by the API, suppress diff
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-param-suppress-computed-diff: true
  # Immutable fields: cannot be changed on an existing subscription
  - target: $.components.schemas.SubscriptionStatus.allOf[?@.properties.apiHrid].properties.apiHrid
    description: API cannot be changed on an existing subscription
    update:
      x-speakeasy-plan-modifiers: Immutable
  - target: $.components.schemas.SubscriptionSpec.properties.planHrid
    description: Plan cannot be changed on an existing subscription
    update:
      x-speakeasy-plan-modifiers: Immutable
  - target: $.components.schemas.SubscriptionSpec.properties.applicationHrid
    description: Application cannot be changed on an existing subscription
    update:
      x-speakeasy-plan-modifiers: Immutable

  - target: $.components.schemas.SubscriptionSpec.properties.endingAt
    description: Using RFC3339 to make sure dates semantics equal
    update:
      x-speakeasy-terraform-custom-type:
        imports:
          - "github.com/gravitee-io/terraform-provider-apim/internal/provider/customtypes"
        schemaType: customtypes.RFC3339Type{}
        valueType: customtypes.RFC3339

  - target: $.components.schemas.ApiKeySpec.properties.key
    description: Hide api key from outputs
    update:
      x-speakeasy-param-sensitive: true

  - target: $.components.schemas.SubscriptionConsumerConfiguration
    description: Manually apply non computed values because of $ref
    update:
      x-speakeasy-param-computed: false

  - target: $.components.schemas.SubscriptionConsumerConfiguration.properties.entrypointConfiguration
    description: Configuration is a mapping, not an empty object. Easiest to define as JSON for now.
    update:
      x-speakeasy-type-override: any
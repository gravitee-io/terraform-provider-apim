overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Application Terraform overlay
  version: 0.0.1
actions:


  # Entity management

  - target: $.paths["/organizations/{orgId}/environments/{envId}/applications"].put
    update:
      x-speakeasy-entity-operation: Application#create,update
  - target: $.paths["/organizations/{orgId}/environments/{envId}/applications/{hrid}"].get
    update:
      x-speakeasy-entity-operation:
        - Application#read
        - Application#create#2
        - Application#update#2
  - target: $.paths["/organizations/{orgId}/environments/{envId}/applications/{hrid}"].delete
    update:
      x-speakeasy-entity-operation: Application#delete
  - target: $.components.schemas.ApplicationSpec
    update:
      x-speakeasy-entity: Application


  # Customizations

  ## Avoid diff for optional properties

  ### Application Spec
  - target: $.components.schemas.ApplicationSpec.properties.groups
    description: Prevent unknown values if unconfigured
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-plan-modifiers: IgnoreEmptyList

  - target: $.components.schemas.ApplicationSpec.properties.members
    description: Prevent unknown values if unconfigured
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.ApplicationSpec.properties.settings
    description: Prevent unknown values if unconfigured
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-param-suppress-computed-diff: true

  ### Application State
  - target: $.components.schemas.ApplicationState.allOf[?@.properties.id].properties.id
    description: Not returned by the API, so prevent null values during refresh
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.ApplicationState.allOf[?@.properties.crossId].properties.crossId
    description: Not returned by the API, so prevent null values during refresh
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.ApplicationSpec.properties.metadata
    description: Prevent empty array to create plan diff
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-plan-modifiers: IgnoreEmptyList

  - target: $.components.schemas.ApplicationTLSSettings.properties.clientCertificate
    description: Using TrimmedString to make sure certs are semantically equal regardless of trailing/leading spaces
    update:
      x-speakeasy-terraform-custom-type:
        imports:
          - "github.com/gravitee-io/terraform-provider-apim/internal/provider/customtypes"
        schemaType: customtypes.TrimmedStringType{}
        valueType: customtypes.TrimmedString

  ## Mutual exclusion for TLS certificate fields (single vs list), both optional
  - target: $.components.schemas.ApplicationTLSSettings.properties.clientCertificate
    description: clientCertificate and clientCertificates are mutually exclusive
    update:
      x-speakeasy-conflicts-with:
        - clientCertificates
  - target: $.components.schemas.ApplicationTLSSettings.properties.clientCertificates
    description: clientCertificates and clientCertificate are mutually exclusive
    update:
      x-speakeasy-conflicts-with:
        - clientCertificate
      x-speakeasy-param-computed: true
      x-speakeasy-plan-modifiers: IgnoreEmptyList

  ## TrimmedString for certificate content in the list variant
  - target: $.components.schemas.ClientCertificate.properties.content
    description: Using TrimmedString to make sure certs are semantically equal regardless of trailing/leading spaces
    update:
      x-speakeasy-terraform-custom-type:
        imports:
          - "github.com/gravitee-io/terraform-provider-apim/internal/provider/customtypes"
        schemaType: customtypes.TrimmedStringType{}
        valueType: customtypes.TrimmedString
  - target: $.components.schemas.ClientCertificate.properties.endsAt
    description: Using RFC3339Type to make sure dates are semantically equal regardless of timezones
    update:
      x-speakeasy-terraform-custom-type:
        imports:
          - "github.com/gravitee-io/terraform-provider-apim/internal/provider/customtypes"
        schemaType: customtypes.RFC3339Type{}
        valueType: customtypes.RFC3339
  - target: $.components.schemas.ClientCertificate.properties.startsAt
    description: Using RFC3339Type to make sure dates are semantically equal regardless of timezones
    update:
      x-speakeasy-terraform-custom-type:
        imports:
          - "github.com/gravitee-io/terraform-provider-apim/internal/provider/customtypes"
        schemaType: customtypes.RFC3339Type{}
        valueType: customtypes.RFC3339


  - target: $.components.schemas.ApplicationSettings.properties.app
    description: Computed because API always returns app settings even when not explicitly configured
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.ApplicationSettings.properties.oauth
    description: Computed because API may return oauth settings even when not explicitly configured
    update:
      x-speakeasy-param-computed: true
      x-speakeasy-param-suppress-computed-diff: true
  ## Ignored for Terraform
  - target: $.components.schemas.ApplicationSpec.properties.status
    description: This property is not managed by Terraform as it is confusing and unnecessary for users.
    update:
      x-speakeasy-terraform-ignore: true

  ## Mutual exclusion for app settings
  ## Wrap $ref in allOf so Speakeasy can apply conflicts-with on nested objects
  - target: $.components.schemas.ApplicationSettings.properties.app['$ref']
    remove: true
  - target: $.components.schemas.ApplicationSettings.properties.app
    description: app and oauth are mutually exclusive
    update:
      allOf:
        - $ref: '#/components/schemas/SimpleApplicationSettings'
      x-speakeasy-conflicts-with:
        - oauth
  - target: $.components.schemas.ApplicationSettings.properties.oauth['$ref']
    remove: true
  - target: $.components.schemas.ApplicationSettings.properties.oauth
    description: oauth and app are mutually exclusive
    update:
      allOf:
        - $ref: '#/components/schemas/ApplicationOAuthClientSettings'
      x-speakeasy-conflicts-with:
        - app
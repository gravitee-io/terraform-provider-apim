name: Terraform Provider Tests

on:
  push:
    branches: [main, '[0-9].[0-9].x']
  pull_request:
  schedule:
    - cron: 30 05 * * 1-5

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-oas:
    name: Verify OAS schema matches APIM main branch
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: "read"
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify OAS schema matches upstream
        uses: ./.github/actions/verify-oas-upstream
      - name: Send slack notification
        if: (failure() || success()) && github.event.schedule != ''
        uses: ./.github/actions/send-slack-notification
        with:
          job_name: ${{ github.job }}
          job_status: ${{ job.status }}
          circleci_token: ${{ secrets.CIRCLECI_TOKEN }}
          trigger: test_results_notification
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup go
        uses: ./.github/actions/setup-go
      - name: Run unit tests
        run: make unit-tests
  acceptance:
    name: Tests - APIM ${{ matrix.apim.image_tag }} - Terraform ${{ matrix.terraform-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        terraform-version:
          - "1.9.*"
          - "latest"
        apim:
          - image_tag: 4.11.x-latest
            chart_version: 4.11.*
          - image_tag: 4.9.x-latest
            chart_version: 4.9.*
          - image_tag: 4.10.x-latest
            chart_version: 4.10.*
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Docker Engine 29+ enables the containerd image store by default,
      # which breaks `kind load docker-image`. Disable it as a workaround.
      - name: Disable Docker containerd image store
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            { "features": { "containerd-snapshotter": false } }
      - name: Create test cluster
        env:
          APIM_GRAVITEE_LICENSE: ${{ secrets.GRAVITEE_LICENSE }}
          APIM_MINIMAL: true
          APIM_IMAGE_TAG: ${{ matrix.apim.image_tag }}
          APIM_CHART_VERSION: ${{ matrix.apim.chart_version }}
        run: make start-cluster
      - name: Setup go
        uses: ./.github/actions/setup-go
      - name: Setup terraform
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ matrix.terraform-version }}
      - name: Run acceptance tests
        env:
          APIM_SERVER_URL: http://localhost:30083/automation
          APIM_USERNAME: admin
          APIM_PASSWORD: admin
          APIM_IMAGE_TAG: ${{ matrix.apim.image_tag }}
        run: make acceptance-tests
      - name: Setup OpenTofu
        if: matrix.terraform-version == 'latest'
        uses: ./.github/actions/setup-opentofu
        with:
          tofu_version: "latest"
      - name: Build provider
        if: matrix.terraform-version == 'latest'
        shell: bash
        run: go build
      - name: Run example tests
        if: matrix.terraform-version == 'latest'
        env:
          APIM_SERVER_URL: http://localhost:30083/automation
          APIM_USERNAME: admin
          APIM_PASSWORD: admin
          APIM_IMAGE_TAG: ${{ matrix.apim.image_tag }}
        run: make examples-tests
      - name: Send Slack notification
        if: (failure() || success()) && github.event.schedule != ''
        uses: ./.github/actions/send-slack-notification
        with:
          job_name: ${{ github.job }} - APIM ${{ matrix.apim.image_tag }} - Terraform ${{ matrix.terraform-version }}
          job_status: ${{ job.status }}
          circleci_token: ${{ secrets.CIRCLECI_TOKEN }}
          trigger: test_results_notification

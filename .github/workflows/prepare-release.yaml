name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: go.mod
      - name: Get Speakeasy version
        id: speakeasy-version
        run: |
          VERSION=$(grep 'speakeasyVersion:' .speakeasy/workflow.yaml | sed -e 's/speakeasyVersion: //')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Install Speakeasy
        uses: mheap/setup-go-cli@fa9b01cdd4115eac636164f0de43bf7d51c82697
        with:
          owner: speakeasy-api
          repo: speakeasy
          cli_name: speakeasy
          package_type: zip
          version: ${{ steps.speakeasy-version.outputs.version }}
      - name: Configure Speakeasy CLI
        run: |
          mkdir -p ~/.speakeasy
          echo 'speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}' > ~/.speakeasy/config.yaml
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - name: Read current version
        id: current-version
        run: |
          VERSION=$(yq '.management.releaseVersion' .speakeasy/gen.lock)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      - name: Determine bump type
        id: bump
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            BUMP="minor"
          elif [[ "$BRANCH" =~ ^[0-9]+\.[0-9]+\.x$ ]]; then
            BUMP="patch"
          else
            echo "::error::Prepare release can only run on 'main' or maintenance branches (e.g. '1.4.x')"
            exit 1
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Bump type: $BUMP (branch: $BRANCH)"
      - name: Bump version
        run: speakeasy bump ${{ steps.bump.outputs.bump }}
      - name: Read new version
        id: new-version
        run: |
          VERSION=$(yq '.terraform.version' .speakeasy/gen.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"
      - name: Validate version
        run: |
          OLD_VERSION="${{ steps.current-version.outputs.version }}"
          NEW_VERSION="${{ steps.new-version.outputs.version }}"
          BUMP="${{ steps.bump.outputs.bump }}"

          OLD_MAJOR=$(echo "$OLD_VERSION" | cut -d. -f1)
          OLD_MINOR=$(echo "$OLD_VERSION" | cut -d. -f2)
          OLD_PATCH=$(echo "$OLD_VERSION" | cut -d. -f3)
          NEW_MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          NEW_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          NEW_PATCH=$(echo "$NEW_VERSION" | cut -d. -f3)

          git fetch --tags

          if git tag -l "v$NEW_VERSION" | grep -q .; then
            echo "::error::Tag v$NEW_VERSION already exists"
            exit 1
          fi

          if [ "$BUMP" = "minor" ]; then
            if [ "$NEW_MAJOR" != "$OLD_MAJOR" ]; then
              echo "::error::Major version changed unexpectedly: $OLD_VERSION -> $NEW_VERSION"
              exit 1
            fi
            EXPECTED_MINOR=$((OLD_MINOR + 1))
            if [ "$NEW_MINOR" != "$EXPECTED_MINOR" ] || [ "$NEW_PATCH" != "0" ]; then
              echo "::error::Expected $OLD_MAJOR.$EXPECTED_MINOR.0 but got $NEW_VERSION"
              exit 1
            fi
          elif [ "$BUMP" = "patch" ]; then
            if [ "$NEW_MAJOR" != "$OLD_MAJOR" ] || [ "$NEW_MINOR" != "$OLD_MINOR" ]; then
              echo "::error::Major or minor version changed unexpectedly: $OLD_VERSION -> $NEW_VERSION"
              exit 1
            fi
            EXPECTED_PATCH=$((OLD_PATCH + 1))
            if [ "$NEW_PATCH" != "$EXPECTED_PATCH" ]; then
              echo "::error::Expected $OLD_MAJOR.$OLD_MINOR.$EXPECTED_PATCH but got $NEW_VERSION"
              exit 1
            fi
          fi

          echo "Version validation passed: $OLD_VERSION -> $NEW_VERSION ($BUMP bump)"
      - name: Regenerate
        run: make speakeasy
      - name: Create branch, commit, and push
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"

          git config user.email "teamgko@graviteesource.com"
          git config user.name "Team GKO"

          git checkout -b "release-$NEW_VERSION"
          git add -A
          git commit -m "release: $NEW_VERSION"
          git push -u origin "release-$NEW_VERSION"
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new-version.outputs.version }}
          BASE_BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          gh pr create \
            --title "release: $NEW_VERSION" \
            --base "$BASE_BRANCH" \
            --body "$(cat <<EOF
          ## Release $NEW_VERSION

          This PR bumps the provider version to \`$NEW_VERSION\` and regenerates the codebase.

          > [!WARNING]
          > **Squash-merge only** with the default PR title \`release: $NEW_VERSION\` (do not edit the squash commit title).
          > Rebase-merge and merge commits will **not** trigger the automated release — use the manual Release workflow instead.
          EOF
          )"
